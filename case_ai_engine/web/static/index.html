<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASE AI Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <aside id="sidebar">
    <div id="sidebar-header">
      <span class="logo">&#9889; CASE AI Engine</span>
      <div class="header-actions">
        <button id="theme-btn" title="Сменить тему" aria-label="Сменить тему"></button>
        <button id="new-btn" title="Новый запуск">+</button>
      </div>
    </div>
    <ul id="runs-list"></ul>
  </aside>

  <main id="chat-panel">
    <div id="messages"></div>

    <form id="input-form">
      <div id="form-row">
        <div id="form-fields">
          <textarea
            id="spec-input"
            placeholder="Опишите проект на русском или английском или вставьте YAML-спецификацию..."
            rows="8"
          ></textarea>
          <div id="model-row">
            <label for="model-input">Модель:</label>
            <input id="model-input" type="text" value="qwen3-coder:30b" />
            <label for="iters-input">Repair-итераций:</label>
            <input id="iters-input" type="number" value="3" min="1" max="10" />
          </div>
        </div>
        <button id="send-btn" type="submit">&#9658; Генерировать</button>
      </div>
    </form>
  </main>

  <aside id="viewer-panel">
    <div id="viewer-header">
      <span id="viewer-title">Файлы проекта</span>
      <button id="download-btn" style="display:none" title="Скачать ZIP">
        &#8595; ZIP
      </button>
    </div>
    <ul id="file-list"></ul>
    <pre id="file-content"><code id="file-code"></code></pre>
  </aside>

  <script src="app.js"></script>
</body>
</html>
